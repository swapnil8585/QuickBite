server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
          filters:
            - AuthenticationFilter

        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/orders/**
          filters:
            - AuthenticationFilter

        - id: restaurant-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/restaurants/**

        - id: delivery-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/delivery/**
          filters:
            - AuthenticationFilter

        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/payments/**
          filters:
            - AuthenticationFilter

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: quickbite-super-secret-jwt-key-change-in-production
  expiration: 86400000   # 24 hours in ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
