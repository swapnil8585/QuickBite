server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/quickbite_users?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: quickbite-super-secret-jwt-key-change-in-production
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.quickbite: DEBUG
    org.springframework.kafka: INFO
